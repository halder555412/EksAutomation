name: Build and Push Docker Image

on:
  push:
    branches: [ "main" ]

jobs:
  build:
#    runs-on: ubuntu-latest

    runs-on: self-hosted

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build JAR
        run: mvn clean package -DskipTests

      - name: Build Docker Image
        run: |
            docker build -t ${{secrets.DOCKER_USERNAME}}/eks-automation:latest .
#            docker tag ${{ secrets.DOCKER_USERNAME }}/eks-automation:${{ github.run_number }} ${{ secrets.DOCKER_USERNAME }}/eks-automation:latest

      - name: Debug secrets
        run: |
          echo "Username is set: ${{ secrets.DOCKER_USERNAME != '' }}"
          echo "Password is set: ${{ secrets.DOCKER_PASSWORD != '' }}"

      - name: Logout from Docker (clean state)
        run: docker logout

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
##       Added new token
#      - name: Login to Docker Hub
#        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Push Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/eks-automation:latest

      - name: Deploy to Kubernetes
        run: |
          kubectl apply -f deployment.yaml
          kubectl apply -f service.yaml
#          docker push ${{ secrets.DOCKER_USERNAME }}/eks-automation:latest

